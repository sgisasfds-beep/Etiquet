<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SafeLabel | Múltiples Etiquetas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0F172A;
            --primary-hover: #1E293B;
            --accent: #2563EB;
            --success: #059669;
            --danger: #DC2626;
            --bg-color: #F1F5F9;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #475569;
            --border-color: #CBD5E1;
            --input-border: #94A3B8;
            --input-bg: #F8FAFC;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            background: var(--primary);
            color: #ffffff;
            padding: 0 40px;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-multi {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .btn-multi:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #38BDF8;
        }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
        }

        .header-section h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--card-bg);
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            margin-bottom: 32px;
        }

        .toolbar label {
            font-weight: 600;
            font-size: 14px;
            margin: 0;
            color: var(--primary);
        }

        .toolbar input[type="number"] {
            width: 80px;
            padding: 10px;
            text-align: center;
            font-weight: 600;
        }

        .grid-forms {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        @keyframes slideFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 24px;
            animation: slideFadeIn 0.3s ease forwards;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 8px;
        }

        .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin: 0;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            color: var(--danger);
            background: #FEE2E2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background: #FFFFFF;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-wrapper:hover {
            border-color: var(--input-border);
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            margin: 0;
        }

        .checkbox-wrapper span {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .autocomplete-container {
            position: relative;
        }

        .lista-autocomplete {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 99;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
            margin-top: 4px;
        }

        .reactivo-opcion {
            padding: 10px 12px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        .reactivo-opcion:last-child {
            border-bottom: none;
        }

        .reactivo-opcion:hover {
            background: var(--input-bg);
            color: var(--accent);
            font-weight: 600;
        }

        button.btn-primary {
            background: var(--accent);
            color: #fff;
            padding: 12px 20px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button.btn-primary:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
        }

        button.btn-secondary {
            background: var(--card-bg);
            color: var(--text-main);
            padding: 12px 20px;
            border: 1px solid var(--input-border);
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button.btn-secondary:hover {
            background: var(--input-bg);
            border-color: var(--text-muted);
        }

        .bottom-action-bar {
            position: sticky;
            bottom: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 20px 32px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .bottom-action-bar span {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .grid-forms {
                grid-template-columns: 1fr;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .bottom-action-bar {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <h1>
            <svg class="icon-safelabel" width="28" height="28" viewBox="0 0 32 32" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M16 2L30 6V14C30 23 16 30 16 30C16 30 2 23 2 14V6L16 2Z" stroke="#2563EB" stroke-width="2.5" stroke-linejoin="round" />
                <path d="M21 11H13L11 15.5H21L19 21H11" stroke="#EF4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M6 7L16 4L26 7" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            SafeLabel | Lotes
        </h1>
        <a href="index.html" class="btn-multi">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Generación Individual
        </a>
    </header>

    <div class="container">
        <div class="header-section">
            <h2>Generación Múltiple de Etiquetas</h2>
        </div>

        <div class="toolbar">
            <label for="numEtiquetas">Cantidad inicial de etiquetas:</label>
            <input id="numEtiquetas" type="number" min="1" value="1">
            <button id="btnGenerarForm" class="btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
                Generar Cuadrícula
            </button>
            <button id="btnAgregar" class="btn-secondary" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Añadir Tarjeta
            </button>
        </div>

        <div id="formContainer" class="grid-forms"></div>

        <div class="bottom-action-bar">
            <span>Verifica la información antes de continuar. Cada tarjeta generará una o más copias.</span>
            <button id="btnSiguiente" class="btn-primary">
                Validar y Procesar Documento
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { API_URL } from "./config.js";

        window.addEventListener("pageshow", async () => {
            console.log("Recargando vista múltiple...");
            setTimeout(() => {
                document.querySelectorAll('img').forEach(img => {
                    const src = img.src;
                    img.src = '';
                    img.src = src;
                });
            }, 100);
        });

        let formCount = 0;
        let listaReactivosGlobal = [];

        async function cargarReactivos() {
            try {
                const res = await fetch(`${API_URL}/api/listaReactivos`, {
                    headers: { "ngrok-skip-browser-warning": "true" }
                });
                listaReactivosGlobal = await res.json();
            } catch (err) {
                console.error("Error cargando reactivos:", err);
            }
        }

        cargarReactivos();

        function crearFormulario() {
            const i = formCount++;
            
            const card = document.createElement("div");
            card.className = "form-card";
            card.dataset.id = i;

            const idLista = `listaReact_${i}`;
            const idInput = `reactivoInput_${i}`;
            const idLabelFabricante = `labelFabricante_${i}`; 

            card.innerHTML = `
                <div class="card-header">
                    <h3>Configuración de Etiqueta</h3>
                    <button class="btn-delete" type="button" title="Eliminar tarjeta">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>

                <label class="checkbox-wrapper">
                    <input type="checkbox" class="fld soloPuros">
                    <span>Modo Reactivos Puros</span>
                </label>

                <div class="form-group autocomplete-container">
                    <label>Nombre del reactivo / Código</label>
                    <input id="${idInput}" class="fld nombreReactivo" type="text" autocomplete="off" placeholder="Buscar reactivo...">
                    <div id="${idLista}" class="lista-autocomplete"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Iniciales responsable</label>
                        <input class="fld analista" type="text" placeholder="Ej. ABC">
                    </div>
                    <div class="form-group">
                        <label>Área de trabajo</label>
                        <input class="fld area" type="text" placeholder="Ej. Calidad">
                    </div>
                </div>

                <div class="form-group">
                    <label>Tiempo de vigencia</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <input class="fld vigenciaValor" type="number" placeholder="Cantidad">
                        <select class="fld vigenciaUnidad">
                            <option>Día(s)</option>
                            <option>Semana(s)</option>
                            <option>Mes(es)</option>
                            <option>Año(s)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label id="${idLabelFabricante}">Seleccione el fabricante</label>
                    <select class="fld fabricante">
                        <option value="">-- Seleccione un fabricante --</option>
                        <option>SGI</option>
                        <option>BIOKAR DIAGNOSTIC</option>
                        <option>MERCK</option>
                        <option>PANREAC</option>
                        <option>AIR PRODUCTS</option>
                        <option>ACCUSTANDARD</option>
                        <option>ACROS ORGANICS</option>
                        <option>ALFA AESAR</option>
                        <option>BIOPHARCHEM</option>
                        <option>CARLO ERBA</option>
                        <option>CDH</option>
                        <option>CHEMI</option>
                        <option>CIACOMEQ</option>
                        <option>EKI</option>
                        <option>FERMONT</option>
                        <option>FISHER CHEMICAL</option>
                        <option>HACH</option>
                        <option>HANNA</option>
                        <option>HONEYWELL</option>
                        <option>J.T.BAKER</option>
                        <option>LABKEM</option>
                        <option>LOBA CHEMIE</option>
                        <option>MESSER</option>
                        <option>MOL LABS</option>
                        <option>QUINALTEC</option>
                        <option>RESTEK</option>
                        <option>SIGMA-ALDRICH</option>
                        <option>THERMO FISHER</option>
                        <option>VHG</option>
                        <option>QUIMMEN</option>
                        <option>HIMEDIA</option>
                        <option>TIMSEN</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Tamaño Envase</label>
                        <select class="fld envase">
                            <option value="">-- Volumen --</option>
                            <option value="30">30 mL</option>
                            <option value="40">40 mL</option>
                            <option value="60">60 mL</option>
                            <option value="100">100 mL</option>
                            <option value="250">250 mL</option>
                            <option value="500">500 mL</option>
                            <option value="1000">1000 mL</option>
                            <option value="2000">2000 mL</option>
                            <option value="3000">3000 mL</option>
                            <option value="10000">10 L</option>
                            <option value="20000">20 L</option>
                            <option value="30000">30 L</option>
                            <option value="40000">40 L</option>
                            <option value="50000">50 L</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Copias</label>
                        <input type="number" class="fld copias" min="1" value="1">
                    </div>
                </div>

                <label class="checkbox-wrapper" style="margin-top: 8px;">
                    <input type="checkbox" class="fld incluirFechas"> 
                    <span>Calcular e incluir fechas (Prep/Venc)</span>
                </label>
            `;

            
            card.querySelector('.btn-delete').addEventListener('click', () => {
                card.style.opacity = '0';
                card.style.transform = 'scale(0.95)';
                setTimeout(() => card.remove(), 200);
            });

            const inputReactivo = card.querySelector(`#${idInput}`);
            const lista = card.querySelector(`#${idLista}`);
            const labelFabricante = card.querySelector(`#${idLabelFabricante}`); 
            const soloPurosCheckbox = card.querySelector(".soloPuros");
            let listaReactivosLocal = [];

            function actualizarLabelFabricante(codigo) {
                if (labelFabricante) {
                    labelFabricante.textContent = `Fabricante para "${codigo}":`;
                }
            }

            async function cargarReactivosLocal() {
                try {
                    const endpoint = soloPurosCheckbox.checked
                        ? "/api/listaReactivosPuros"
                        : "/api/listaReactivos";

                    const res = await fetch(`${API_URL}${endpoint}`, {
                        headers: { "ngrok-skip-browser-warning": "true" }
                    });

                    listaReactivosLocal = await res.json();
                } catch (err) {
                    console.error("Error cargando reactivos locales:", err);
                }
            }

            cargarReactivosLocal();

            soloPurosCheckbox.addEventListener("change", async () => {
                inputReactivo.value = "";
                lista.innerHTML = "";
                lista.style.display = "none";
                card.dataset.codigoReactivo = null;
                actualizarLabelFabricante("código");
                await cargarReactivosLocal();
            });

            inputReactivo.addEventListener("input", () => {
                const texto = inputReactivo.value.toLowerCase();
                lista.innerHTML = "";
                card.dataset.codigoReactivo = null;
                actualizarLabelFabricante("código");

                if (!texto) {
                    lista.style.display = "none";
                    return;
                }
                const filtrados = listaReactivosLocal.filter(r =>
                    r.nombre.toLowerCase().includes(texto)
                );
                
                filtrados.slice(0, 20).forEach(reactivo => { 
                    const div = document.createElement("div");
                    div.className = "reactivo-opcion";
                    div.textContent = reactivo.nombre;

                    div.addEventListener("click", () => {
                        inputReactivo.value = reactivo.nombre;
                        lista.style.display = "none";
                        card.dataset.codigoReactivo = reactivo.codigo;
                        actualizarLabelFabricante(reactivo.codigo);
                    });
                    lista.appendChild(div);
                });

                lista.style.display = filtrados.length ? "block" : "none";
            });
            
            document.addEventListener("click", (e) => {
                if (e.target !== inputReactivo && !lista.contains(e.target)) {
                    lista.style.display = "none";
                }
            });

            return card;
        }

        const formContainer = document.getElementById("formContainer");

        function generarNForms(n) {
            formContainer.innerHTML = "";
            formCount = 0;
            for (let i = 0; i < n; i++) {
                formContainer.appendChild(crearFormulario());
            }
        }

        
        document.getElementById("btnGenerarForm").addEventListener("click", () => {
            generarNForms(Number(document.getElementById("numEtiquetas").value || 1));
        });

        document.getElementById("btnAgregar").addEventListener("click", () => {
            formContainer.appendChild(crearFormulario());
        });

        
        document.getElementById("btnSiguiente").addEventListener("click", () => {
            const cards = [...formContainer.children];
            
            if (cards.length === 0) {
                alert("Debes agregar al menos una etiqueta a la cuadrícula.");
                return;
            }

            const etiquetas = [];
            let indexError = 1;

            for (const c of cards) {
                const nombre = c.querySelector(".nombreReactivo").value.trim();
                const codigoReactivo = c.dataset.codigoReactivo;

                if (!nombre) {
                    alert(`El nombre del reactivo está vacío en la tarjeta #${indexError}.`);
                    return;
                }
                if (!codigoReactivo || codigoReactivo === "null") {
                    alert(`Debes seleccionar un reactivo válido de la lista autocompletable en la tarjeta #${indexError}.`);
                    return;
                }
                
                if (!c.querySelector(".envase").value) {
                    alert(`Debes seleccionar el tamaño del envase en la tarjeta #${indexError}.`);
                    return;
                }

                etiquetas.push({
                    nombreReactivo: nombre,
                    codigoReactivo: codigoReactivo,
                    analista: c.querySelector(".analista").value.trim(),
                    area: c.querySelector(".area").value.trim(),
                    vigenciaValor: c.querySelector(".vigenciaValor").value.trim(),
                    vigenciaUnidad: c.querySelector(".vigenciaUnidad").value,
                    fabricante: c.querySelector(".fabricante").value.trim(),
                    envase: c.querySelector(".envase").value.trim(),
                    incluirFechas: c.querySelector(".incluirFechas").checked,
                    soloPuros: c.querySelector(".soloPuros").checked,
                    copias: parseInt(c.querySelector(".copias").value || "1")
                });
                indexError++;
            }

            sessionStorage.setItem("multiEtiquetas_datos", JSON.stringify(etiquetas));
            window.location.href = "multiEtiqueta.html";
        });
    </script>
</body>
</html>

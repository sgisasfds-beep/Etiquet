<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeLabel | Vista Previa de Lotes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0F172A;
            --primary-hover: #1E293B;
            --accent: #2563EB;
            --success: #059669;
            --danger: #DC2626;
            --bg-color: #F1F5F9;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #475569;
            --border-color: #CBD5E1;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            background: var(--primary);
            color: #ffffff;
            padding: 0 40px;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0;
        }

        .btn-volver {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .btn-volver:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #38BDF8;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            border: 1px solid var(--border-color);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .header-section h2 {
            color: var(--primary);
            font-size: 26px;
            font-weight: 700;
            margin: 0;
        }

        .header-section p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 15px;
        }

        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        button {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            padding: 12px 24px;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        button:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
        }

        button.secondary {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        button.secondary:hover {
            background: var(--bg-color);
            border-color: #94A3B8;
            transform: translateY(-1px);
        }

        button.success {
            background: var(--success);
            color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.2);
            margin-bottom: 10px;
        }

        button.success:hover {
            background: #047857;
            box-shadow: 0 6px 8px -1px rgba(5, 150, 105, 0.3);
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            padding: 16px;
            border-radius: 8px;
            background: #F8FAFC;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        #status:empty {
            display: none;
        }

        #listaEtiquetas {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
            margin-top: 30px;
            width: 100%;
            overflow: visible;
            background: #E2E8F0;
            padding: 40px 20px;
            border-radius: 8px;
            border: 1px inset var(--border-color);
        }

        .wrapper-etiqueta {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .etiqueta {
            display: inline-block;
            min-width: 400px;
            border: 4px solid black;
            padding: 25px;
            font-family: Arial, sans-serif;
            background: white;
            overflow: visible;
            box-sizing: border-box;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .img-pictograma {
            position: absolute !important;
            width: 180px !important;
            height: 180px !important;
            object-fit: contain;
        }

        .zonaPictogramas {
            position: relative !important;
            margin: 20px auto;
            display: inline-block;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>

    <header class="topbar">
        <h1>
            <svg class="icon-safelabel" width="28" height="28" viewBox="0 0 32 32" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M16 2L30 6V14C30 23 16 30 16 30C16 30 2 23 2 14V6L16 2Z" stroke="#2563EB" stroke-width="2.5"
                    stroke-linejoin="round" />
                <path d="M21 11H13L11 15.5H21L19 21H11" stroke="#EF4444" stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M6 7L16 4L26 7" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            SafeLabel | Visor Múltiple
        </h1>
        <a href="javascript:history.back()" class="btn-volver">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Volver al formulario
        </a>
    </header>

    <div class="container">
        <div class="header-section">
            <h2>Previsualización de Lote</h2>
            <p>Modifica la preparación directamente sobre la etiqueta si es necesario. El cambio se aplicará a todas sus
                copias.</p>
        </div>

        <div class="controls">
            <button id="btnGenerarDOCX">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Generar archivo DOCX
            </button>
            <button id="btnDescargar" class="secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Descargar archivo
            </button>
        </div>

        <div id="status"></div>

        <div id="listaEtiquetas"></div>
    </div>

    <script type="module">
        import { API_URL } from "./config.js";

        const datosJSON = sessionStorage.getItem("multiEtiquetas_datos");
        const datos = datosJSON ? JSON.parse(datosJSON) : [];
        window.datos = datos;

        if (datos.length === 0) {
            console.error("No se encontraron datos de etiquetas en sessionStorage.");
        }

        const statusEl = document.getElementById("status");

        function setStatus(message, isError = false) {
            if (!statusEl) return;
            statusEl.textContent = message;

            if (isError) {
                statusEl.style.color = "var(--danger)";
                statusEl.style.backgroundColor = "#FEF2F2";
                statusEl.style.borderColor = "#FCA5A5";
            } else {
                statusEl.style.color = "var(--success)";
                statusEl.style.backgroundColor = "#ECFDF5";
                statusEl.style.borderColor = "#6EE7B7";
            }
            console.log(isError ? `[ERROR] ${message}` : `[STATUS] ${message}`);
        }

        function crearPlantillaMiniEtiqueta() {
            const div = document.createElement("div");
            div.className = "etiqueta";
            div.style.width = "500px";
            div.style.height = "350px";
            div.style.margin = "30px auto";
            div.style.border = "3px solid black";
            div.style.padding = "15px";
            div.style.boxSizing = "border-box";
            div.style.backgroundColor = "white";
            div.style.fontFamily = "Arial, sans-serif";

            div.innerHTML = `
        <div class="etiqueta-grid"
             style="display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto auto auto auto; gap:8px 0; height:100%; align-items:start;">
            <div style="grid-column:1/3; text-align:left; font-size:10px; font-weight:bold; padding-bottom:6px; border-bottom:2px solid black;">
                ADVERTENCIA: <span class="advertencia">ATENCION</span>
            </div>
            <div style="grid-column:1/3; display:flex; flex-direction:column; align-items:center; padding-top:6px; flex:1;">
                <div class="nombreReactivo" style="font-size:20px; font-weight:bold; margin-bottom:8px; text-align:center; line-height:1.15; max-height:60px; overflow:hidden; word-break:break-word;">
                    REACTIVO
                </div>
                <div style="width:100%; display:flex; justify-content:center; gap:40px; margin-top:4px;">
                    <div class="zonaPictogramas" style="width:180px; height:180px; margin-top:-10px; display:flex; align-items:center; justify-content:center;"></div>
                    <div style="width:150px; height:150px; display:flex; align-items:center; justify-content:center;">
                        <img class="qr" src="" style="max-width:100%; max-height:100%; object-fit:contain;">
                    </div>
                </div>
            </div>
            <div style="grid-column:1/3; border-top:2px solid black; margin-top:6px;"></div>
            <div class="footer-proveedor" style="grid-column:1/3; padding-top:6px;">
                <div style="display:flex; align-items:center; width:100%; font-size:11px; font-weight:bold;">
                  <span style="margin-right:6px; white-space:nowrap;">Fabricante:</span>
                  <div class="fabricante-wrapper" style="flex:1; overflow:hidden;">
                        <span class="fabricante-text" style="display:inline-block; white-space:nowrap; transform-origin:left center;"></span>
                  </div>
                </div>
            </div>
        </div>
        <div style="display:none;">
            <span class="preparacion"></span>
            <span class="analista"></span>
            <span class="fechaPreparado"></span>
            <span class="fechaVencimiento"></span>
            <div class="frasesHP"></div>
        </div>
    `;
            return div;
        }

        function crearPlantillaEtiqueta() {
            const div = document.createElement("div");
            div.className = "etiqueta";
            div.innerHTML = `
    <div style="display: grid; grid-template-columns: 450px 30px auto; column-gap: 0;">
      <div style="grid-column: 1;">
        <div style="font-size:14px;">
          <strong>Proveedor:</strong> <span class="proveedor"></span>
        </div>
      </div>
      <div style="grid-column: 3; text-align:center;">
        <strong>Pictogramas de<br>Peligro</strong>
      </div>
      <div style="grid-column: 1; margin-top:14px;">
        <hr style="border:1px solid black; margin:0;">
      </div>
      <div style="grid-column: 1; margin-top:20px;">
        <strong style="font-size: 17px;" class="nombreReactivo"></strong>
        <br><br>
        <p><strong>Preparación:</strong></p>
        <p class="preparacion"></p>
        <p><strong>ADVERTENCIA: <span class="advertencia"></span></strong></p>
        <div class="frasesHP"></div>
      </div>
      <div style="grid-column: 3; text-align: center; display:flex; flex-direction:column; align-items:center;min-width: max-content;">
        <div class="zonaPictogramas"></div>
        <img class="qr" style="width:150px; margin-top:60px; border: 1px solid #ccc;">
      </div>
      <div style="grid-column: 1; margin-top:20px;">
        <hr style="border:1px solid black; margin:0;">
      </div>
      <div style="grid-column: 1; margin-top:20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; column-gap: 40px;">
          <div>
            <strong>Fecha Preparado:</strong><br>
            <span class="fechaPreparado"></span>
          </div>
          <div style="text-align: right;">
            <strong>Fecha Vencimiento:</strong><br>
            <span class="fechaVencimiento"></span>
          </div>
        </div>
        <div style="margin-top:18px;">
          <strong>Preparado por:</strong><br>
          <span class="analista"></span>
        </div>
      </div>
    </div>
  `;
            return div;
        }

        async function cargarEtiquetas() {
            const contenedor = document.getElementById("listaEtiquetas");
            setStatus("Generando carpetas y QRs en Google Drive, por favor espera...", false);

            let itemIndex = 0;

            for (const item of datos) {
                const resVisual = await fetch(`${API_URL}/api/generarEtiqueta`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                    body: JSON.stringify({
                        nombreReactivo: item.nombreReactivo,
                        fabricante: item.fabricante,
                        volumen: item.envase,
                        modoReactivosPuros: item.soloPuros
                    })
                });
                const info = await resVisual.json();

                let qrBase64 = "";
                try {
                    const resQR = await fetch(`${API_URL}/api/procesarCarpetaReactivo`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                        body: JSON.stringify({
                            nombreReactivo: item.nombreReactivo,
                            usuarioAnalista: item.analista,
                            fabricante: item.fabricante,
                            modoReactivosPuros: item.soloPuros
                        })
                    });
                    const dataQR = await resQR.json();
                    if (dataQR.ok) qrBase64 = dataQR.qr;
                } catch (err) {
                    console.error("Error conectando para QR:", err);
                }

                if (!resVisual.ok) continue;

                const copias = item.copias || 1;
                const envaseMini = ["30", "30 mL", "40", "40 mL", "60", "60 mL"];

                const esEditable = !item.soloPuros;
                const idGrupo = `grupo-reactivo-${itemIndex}`;

                for (let c = 0; c < copias; c++) {
                    let et;
                    if (envaseMini.includes(item.envase)) {
                        et = crearPlantillaMiniEtiqueta();
                    } else {
                        et = crearPlantillaEtiqueta();
                    }

                    et.querySelector(".nombreReactivo").textContent = info.nombre;

                    const pPreparacion = et.querySelector(".preparacion");
                    pPreparacion.textContent = info.preparación || "No aplica";

                    if (esEditable) {
                        pPreparacion.contentEditable = "true";
                        pPreparacion.dataset.grupo = idGrupo;

                        pPreparacion.style.outline = "none";
                        pPreparacion.style.padding = "4px";
                        pPreparacion.style.transition = "background 0.3s";
                        pPreparacion.style.borderRadius = "4px";

                        pPreparacion.addEventListener("focus", () => {
                            pPreparacion.style.background = "#fff3cd";
                            pPreparacion.style.border = "1px dashed #ffc107";
                        });

                        pPreparacion.addEventListener("blur", () => {
                            pPreparacion.style.background = "transparent";
                            pPreparacion.style.border = "none";
                        });

                        pPreparacion.addEventListener("input", (e) => {
                            const nuevoTexto = e.target.innerText;
                            document.querySelectorAll(`.preparacion[data-grupo="${idGrupo}"]`).forEach(el => {
                                if (el !== e.target) {
                                    el.innerText = nuevoTexto;
                                }
                            });
                        });
                    } else {
                        pPreparacion.contentEditable = "false";
                    }

                    et.querySelector(".advertencia").textContent = info.palabra_advertencia || "—";
                    et.querySelector(".analista").textContent = item.analista || "—";

                    const proveedorNormal = et.querySelector(".proveedor");
                    const fabricanteTextMini = et.querySelector(".fabricante-text");
                    const fabricanteWrapper = et.querySelector(".fabricante-wrapper");

                    const nombreUpper = (info.nombre || "").toUpperCase();
                    const esReenvasado = nombreUpper.includes("REENVASADO") || nombreUpper.includes("REENVASADA");

                    let infoCompleta = "";
                    if (item.soloPuros || esReenvasado) {
                        const fabricante = info.fabricanteFiltrado || "Fabricante no definido";
                        const direccion = info.direccion || "";
                        const telefono = info.telefono || "";
                        infoCompleta = fabricante;
                        if (direccion) infoCompleta += " - " + direccion;
                        if (telefono) infoCompleta += " - Tel: " + telefono;
                    } else {
                        infoCompleta = "SGI SAS - Cra. 32B #22B-29 - Tel: 3142742383";
                    }

                    if (proveedorNormal) {
                        proveedorNormal.textContent = infoCompleta;
                        proveedorNormal.style.fontSize = "11px";
                        proveedorNormal.style.display = "inline-block";
                        proveedorNormal.style.lineHeight = "1.1";
                    }

                    if (fabricanteTextMini && fabricanteWrapper) {
                        fabricanteTextMini.textContent = infoCompleta;
                        requestAnimationFrame(() => {
                            const textWidth = fabricanteTextMini.scrollWidth;
                            const containerWidth = fabricanteWrapper.offsetWidth;
                            if (textWidth > containerWidth) {
                                let scale = containerWidth / textWidth;
                                if (scale < 0.6) scale = 0.6;
                                fabricanteTextMini.style.transform = `scale(${scale})`;
                            } else {
                                fabricanteTextMini.style.transform = "scale(1)";
                            }
                        });
                    }

                    let htmlHP = "";
                    info.frases_h?.forEach(f => htmlHP += `<p style="margin: 2px 0;">${f}</p>`);
                    info.frases_p?.forEach(f => htmlHP += `<p style="margin: 2px 0;">${f}</p>`);
                    et.querySelector(".frasesHP").innerHTML = htmlHP;

                    const zonaImg = et.querySelector(".zonaPictogramas");
                    if (zonaImg) {
                        const picos = info.pictogramas || [];
                        const volNumerico = parseInt(item.envase) || 0;
                        const esMini = envaseMini.includes(item.envase);
                        const listaFinal = (volNumerico < 100 && picos.length > 0) ? [picos[0]] : picos;

                        let htmlPictos = "";
                        const count = listaFinal.length;
                        if (count === 1) {
                            zonaImg.style.width = "180px";
                            zonaImg.style.height = "180px";
                            htmlPictos = `<img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">`;
                        } else if (count === 2) {
                            zonaImg.style.width = "360px";
                            zonaImg.style.height = "180px";
                            htmlPictos = `
                <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">
                <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:0; left:180px;">
              `;
                        } else if (count === 3) {
                            zonaImg.style.width = "385px";
                            zonaImg.style.height = "307px";
                            htmlPictos = `
                <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:102.5px;">
                <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:127px; left:0;">
                <img src="/imagenes/${getPictogramName(listaFinal[2])}.png" class="img-pictograma" style="top:127px; left:205px;">
              `;
                        } else if (count === 4) {
                            zonaImg.style.width = "360px";
                            zonaImg.style.height = "307px";
                            htmlPictos = `
                <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">
                <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:0; left:180px;">
                <img src="/imagenes/${getPictogramName(listaFinal[2])}.png" class="img-pictograma" style="top:127px; left:0;">
                <img src="/imagenes/${getPictogramName(listaFinal[3])}.png" class="img-pictograma" style="top:127px; left:180px;">
              `;
                        } else if (count === 5) {
                            zonaImg.style.width = "540px";
                            zonaImg.style.height = "307px";
                            htmlPictos = `
                <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">
                <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:0; left:180px;">
                <img src="/imagenes/${getPictogramName(listaFinal[2])}.png" class="img-pictograma" style="top:0; left:360px;">
                <img src="/imagenes/${getPictogramName(listaFinal[3])}.png" class="img-pictograma" style="top:127px; left:90px;">
                <img src="/imagenes/${getPictogramName(listaFinal[4])}.png" class="img-pictograma" style="top:127px; left:270px;">
              `;
                        }
                        zonaImg.innerHTML = htmlPictos;

                        if (esMini) {
                            zonaImg.style.transform = "scale(1)";
                            zonaImg.style.transformOrigin = "center top";
                            zonaImg.style.marginBottom = "-40px";
                        } else {
                            zonaImg.style.transform = "scale(1)";
                            zonaImg.style.transformOrigin = "center top";
                            zonaImg.style.marginBottom = "-50px";
                        }
                    }

                    if (qrBase64) et.querySelector(".qr").src = qrBase64;

                    if (!item.incluirFechas) {
                        et.querySelector(".fechaPreparado").style.display = "none";
                        et.querySelector(".fechaVencimiento").style.display = "none";
                    } else {
                        const hoy = new Date();
                        et.querySelector(".fechaPreparado").textContent = hoy.toLocaleDateString("es-CO");
                        let venc = new Date(hoy);
                        const valorVigencia = parseInt(item.vigenciaValor) || 0;
                        switch (item.vigenciaUnidad) {
                            case "Día(s)": venc.setDate(venc.getDate() + valorVigencia); break;
                            case "Semana(s)": venc.setDate(venc.getDate() + 7 * valorVigencia); break;
                            case "Mes(es)": venc.setMonth(venc.getMonth() + valorVigencia); break;
                            case "Año(s)": venc.setFullYear(venc.getFullYear() + valorVigencia); break;
                        }
                        et.querySelector(".fechaVencimiento").textContent = venc.toLocaleDateString("es-CO");
                    }

                    const wrapper = document.createElement("div");
                    wrapper.className = "wrapper-etiqueta";

                    if (esEditable && c === 0) {
                        const btnGuardar = document.createElement("button");
                        btnGuardar.className = "success";
                        btnGuardar.innerHTML = `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                   <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                   <polyline points="17 21 17 13 7 13 7 21"></polyline>
                   <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                Guardar preparación en BD
             `;

                        btnGuardar.addEventListener("click", async () => {
                            const textoActual = pPreparacion.innerText.trim();
                            if (!textoActual) {
                                setStatus("La preparación no puede estar vacía.", true);
                                return;
                            }

                            setStatus(`Guardando preparación para ${info.nombre}...`, false);
                            try {
                                const res = await fetch(`${API_URL}/api/actualizarPreparacion`, {
                                    method: "PUT",
                                    headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                                    body: JSON.stringify({ nombre: info.nombre, preparacion: textoActual })
                                });
                                const data = await res.json();
                                if (!res.ok) throw new Error(data.error || "Desconocido");
                                setStatus(`Preparación de ${info.nombre} actualizada correctamente en la BD.`, false);
                            } catch (err) {
                                setStatus(`Error al guardar: ${err.message}`, true);
                            }
                        });
                        wrapper.appendChild(btnGuardar);
                    }

                    wrapper.appendChild(et);
                    contenedor.appendChild(wrapper);
                }

                itemIndex++;
            }
            setStatus("Etiquetas listas. Revisa los QRs, edita las preparaciones si es necesario y genera el archivo DOCX.", false);
        }

        cargarEtiquetas();

        document.getElementById("btnGenerarDOCX").addEventListener("click", async () => {
            document.querySelectorAll(".preparacion").forEach(el => {
                el.style.background = "transparent";
                el.style.border = "none";
            });

            const etiquetasDOM = [...document.querySelectorAll(".etiqueta")];

            if (etiquetasDOM.length === 0) {
                setStatus("No hay etiquetas para convertir.", true);
                return;
            }

            setStatus("Procesando etiquetas…", false);
            if (!window.datos) {
                setStatus("Error: No se encontraron los datos de los reactivos.", true);
                return;
            }

            const payloadEtiquetas = [];
            let etiquetasIndex = 0;

            const btn = document.getElementById("btnGenerarDOCX");
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Procesando...`;
            btn.style.pointerEvents = 'none';

            for (const item of window.datos) {
                const copias = item.copias || 1;
                for (let c = 0; c < copias; c++) {
                    const et = etiquetasDOM[etiquetasIndex];
                    if (!et) {
                        console.error("Faltan elementos DOM para la etiqueta #", etiquetasIndex);
                        break;
                    }

                    const canvas = await html2canvas(et, { scale: 2, background: '#fff' });
                    payloadEtiquetas.push({
                        base64Image: canvas.toDataURL("image/png").replace(/^data:image\/png;base64,/, ""),
                        envase: item.envase
                    });
                    etiquetasIndex++;
                }
            }

            try {
                const res = await fetch(`${API_URL}/api/generarDocumentoMultiples`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                    body: JSON.stringify({ etiquetas: payloadEtiquetas })
                });
                const data = await res.json();

                btn.innerHTML = originalText;
                btn.style.pointerEvents = 'auto';

                if (data.ok) {
                    window.__archivoFinal = data.archivo;
                    setStatus("Documento generado correctamente. Usa 'Descargar archivo'.", false);
                } else {
                    setStatus(`Error generando documento: ${data.error || 'Desconocido'}`, true);
                }
            } catch (e) {
                btn.innerHTML = originalText;
                btn.style.pointerEvents = 'auto';
                setStatus("Fallo de red al generar el documento.", true);
            }
        });

        document.getElementById("btnDescargar").addEventListener("click", async () => {
            if (!window.__archivoFinal) {
                setStatus("Primero genera el documento.", true);
                return;
            }
            setStatus("Iniciando descarga del archivo...", false);
            const archivoADescargar = window.__archivoFinal;
            const urlDescarga = `${API_URL}/api/descargar/${archivoADescargar}`;

            try {
                const response = await fetch(urlDescarga, {
                    method: 'GET',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });

                if (!response.ok) {
                    setStatus(`Error ${response.status} al descargar el archivo.`, true);
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = archivoADescargar;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                setStatus("Archivo descargado con éxito.", false);
            } catch (error) {
                console.error("Error en la descarga:", error);
                setStatus("Falló la descarga. Revisa la consola.", true);
            }
        });

        function getPictogramName(ghsCode) {
            const map = {
                "GHS01": "explosivo",
                "GHS02": "inflamable",
                "GHS03": "comburente",
                "GHS04": "gas",
                "GHS05": "corrosivo",
                "GHS06": "toxico",
                "GHS07": "irritacion",
                "GHS08": "salud",
                "GHS09": "medioambiente"
            };
            return map[ghsCode] || "noaplica";
        }
    </script>

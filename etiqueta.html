<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeLabel | Vista Previa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">

    <style>
        
        :root {
            --primary: #0F172A;
            
            --primary-hover: #1E293B;
            --accent: #2563EB;
            
            --success: #059669;
            --danger: #DC2626;
            --bg-color: #F1F5F9;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #475569;
            --border-color: #CBD5E1;
            --input-border: #94A3B8;
            --input-bg: #F8FAFC;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        
        .topbar {
            background: var(--primary);
            color: #ffffff;
            padding: 0 40px;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-multi {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .btn-multi:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #38BDF8;
        }

        
        .container {
            width: fit-content;
            min-width: 950px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            border: 1px solid var(--border-color);
        }

        h2 {
            color: var(--primary);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }

        .etiqueta-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
            background: #F8FAFC;
            padding: 24px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        #contenedorEtiqueta {
            display: inline-block;
            min-width: 400px;
            border: 4px solid black;
            padding: 25px;
            font-family: Arial, sans-serif;
            background: white;
            overflow: visible;
            box-sizing: border-box;
        }

        #zonaPictogramas {
            position: relative;
            display: inline-block;
            margin: 20px auto;
        }

        .img-pictograma {
            position: absolute;
            width: 180px;
            height: 180px;
            object-fit: contain;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label.small {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        button {
            padding: 14px 24px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #btnCapturar {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        #btnCapturar:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
        }

        #btnPreview {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--input-border);
        }

        #btnPreview:hover {
            border-color: #64748B;
            color: var(--text-main);
            background: var(--input-bg);
        }

        #btnGuardarPrep {
            background: var(--accent);
            color: #fff;
            width: 100%;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.2);
        }

        #btnGuardarPrep:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(5, 150, 105, 0.3);
        }

        #status {
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>

    <header class="topbar">
        <h1>
            <svg class="icon-safelabel" width="28" height="28" viewBox="0 0 32 32" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M16 2L30 6V14C30 23 16 30 16 30C16 30 2 23 2 14V6L16 2Z" stroke="#2563EB" stroke-width="2.5"
                    stroke-linejoin="round" />
                <path d="M21 11H13L11 15.5H21L19 21H11" stroke="#EF4444" stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M6 7L16 4L26 7" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            SafeLabel
        </h1>
        <a href="index.html" class="btn-multi">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Volver al Formulario
        </a>
    </header>

    <div class="container">
        <h2>Vista Previa de la Etiqueta Corporativa</h2>

        <div class="etiqueta-wrapper">
            <div id="contenedorEtiqueta">
                <div style="display: grid; grid-template-columns: 450px 30px auto; column-gap: 0;">
                    <div style="grid-column: 1;">
                        <div id="proveedorInfo" style="font-size:14px;">
                            <strong>Proveedor:</strong> <span id="displayFabricante"></span>
                        </div>
                    </div>
                    <div style="grid-column: 2;"></div>
                    <div style="grid-column: 3; text-align:center;">
                        <strong>Pictogramas de<br>Peligro</strong>
                    </div>
                    <div style="grid-column: 1; margin-top:14px;">
                        <hr style="border:1px solid black; margin:0;">
                    </div>
                    <div style="grid-column: 1; margin-top:20px;">
                        <strong style="font-size: 17px;" id="nombreReactivo">NOMBRE DEL REACTIVO</strong>
                        <br><br>
                        <p><strong>Preparación:</strong></p>
                        <p id="preparacion" style="outline: none; padding: 4px; transition: background 0.3s;"></p>
                        <p><strong>ADVERTENCIA: <span id="advertencia">ATENCIÓN</span></strong></p>
                        <div id="frasesHP"></div>
                    </div>
                    <div
                        style="grid-column: 3; text-align: center; display:flex; flex-direction:column; align-items:center;min-width: max-content;">
                        <div id="zonaPictogramas"></div>

                        <img id="qrCarpetaDrive" src="" alt="Código QR Carpeta Drive"
                            style="width:150px; margin-top:10px; border: 1px solid #ccc;">
                    </div>
                    <div style="grid-column: 1; margin-top:20px;">
                        <hr style="border:1px solid black; margin:0;">
                    </div>
                    <div style="grid-column: 1; margin-top:20px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; column-gap: 40px;">
                            <div>
                                <strong>Fecha Prepared:</strong><br>
                                <span id="fechaPreparado">DD/MM/YYYY</span>
                            </div>
                            <div style="text-align: right;">
                                <strong>Fecha Vencimiento:</strong><br>
                                <span id="fechaVencimiento">DIA/MES/AÑO</span>
                            </div>
                        </div>
                        <div style="margin-top:18px;">
                            <strong>Preparado por:</strong><br>
                            <span id="analista">ANALISTA DE LABORATORIO</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="contenedorGuardarPrep" style="display: none; margin-bottom: 24px;">
            <button id="btnGuardarPrep">Guardar Preparación Editada</button>
        </div>

        <div class="controls">
            <div class="form-group">
                <label class="small">Cantidad de etiquetas a generar:</label>
                <input id="inputCantidad" type="number" min="1" value="1" />
            </div>

            <div class="form-group">
                <label class="small">(Opcional) Nombre archivo:</label>
                <input id="nombreArchivo" type="text" placeholder="etiquetas" />
            </div>
        </div>

        <div class="button-group">
            <button id="btnCapturar" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                Capturar etiqueta y generar documento
            </button>
            <button id="btnPreview" class="secondary" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Descargar archivo DOCX
            </button>
        </div>

        <div id="status"></div>
    </div>

    <script type="module">
        import { API_URL } from "./config.js";

        const statusEl = document.getElementById("status");
        const contenedor = document.getElementById("contenedorEtiqueta");
        const btn = document.getElementById("btnCapturar");
        const btnPreview = document.getElementById("btnPreview");
        let envase = "";

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.style.color = isError ? "var(--danger)" : "var(--success)";
        }

        async function cargarDatos() {
            console.log("🔥 Ejecutando cargarDatos (Pageshow/Load)");

            const datos = JSON.parse(sessionStorage.getItem("datosEtiqueta") || "{}");
            if (!datos.usuario || !datos.reactivo) {
                setStatus("No se pudo cargar la información del reactivo.", true);
                return;
            }

            const { nombreReactivo, analista, vigenciaValor, vigenciaUnidad, incluirFechas } = datos.usuario || {};
            envase = (datos.usuario && datos.usuario.envase) || (datos.reactivo && datos.reactivo.volumen) || "";

            const { preparación, palabra_advertencia, frases_h, frases_p, pictogramas } = datos.reactivo || {};

            const proveedorEl = document.getElementById("displayFabricante");
            const nombreNormalizado = (nombreReactivo || "").toLowerCase();
            const esReenvasado = nombreNormalizado.includes("reenvasado") || nombreNormalizado.includes("reenvasada");

            if (esReenvasado) {
                const fabricante = datos.usuario.fabricante || "";
                const direccion = datos.reactivo.direccion || "";
                const telefono = datos.reactivo.telefono || "";
                let infoCompleta = fabricante;
                if (direccion) infoCompleta += " - " + direccion;
                if (telefono) infoCompleta += " - Tel: " + telefono;
                proveedorEl.textContent = infoCompleta || "Proveedor no definido";
            } else {
                if (datos.usuario.modoReactivosPuros) {
                    const fabricante = datos.usuario.fabricante || "";
                    const direccion = datos.reactivo.direccion || "";
                    const telefono = datos.reactivo.telefono || "";
                    let infoCompleta = fabricante;
                    if (direccion) infoCompleta += " - " + direccion;
                    if (telefono) infoCompleta += " - Tel: " + telefono;
                    proveedorEl.textContent = infoCompleta;
                    if (infoCompleta.length > 80) {
                        proveedorEl.parentElement.style.fontSize = "10px";
                    } else if (infoCompleta.length > 50) {
                        proveedorEl.parentElement.style.fontSize = "12px";
                    }
                } else {
                    proveedorEl.textContent = "SGI SAS - Cra. 32B #22B-29 - Tel: 3142742383";
                }
            }

            document.getElementById("nombreReactivo").textContent = nombreReactivo || "NOMBRE DEL REACTIVO";
            document.getElementById("analista").textContent = analista || "ANALISTA DE LABORATORIO";
            document.getElementById("preparacion").textContent = preparación || "No aplica";

            const pPreparacion = document.getElementById("preparacion");
            const contenedorGuardar = document.getElementById("contenedorGuardarPrep");
            const modoPuros = datos.usuario && datos.usuario.modoReactivosPuros;

            if (modoPuros) {
                pPreparacion.contentEditable = "false";
                pPreparacion.style.border = "none";
                contenedorGuardar.style.display = "none";
            } else {
                pPreparacion.contentEditable = "true";
                contenedorGuardar.style.display = "block";

                pPreparacion.addEventListener("focus", () => {
                    pPreparacion.style.background = "#fff3cd";
                    pPreparacion.style.border = "1px dashed #ffc107";
                });
                pPreparacion.addEventListener("blur", () => {
                    pPreparacion.style.background = "transparent";
                    pPreparacion.style.border = "none";
                });
            }
            document.getElementById("advertencia").textContent = palabra_advertencia || "No definida";

            const spanPreparado = document.getElementById("fechaPreparado");
            const spanVencimiento = document.getElementById("fechaVencimiento");

            if (incluirFechas) {
                spanPreparado.style.display = "inline";
                spanVencimiento.style.display = "inline";
                const hoy = new Date();
                spanPreparado.textContent = hoy.toLocaleDateString("es-CO");
                let venc = new Date(hoy);
                switch (vigenciaUnidad) {
                    case "Día(s)": venc.setDate(venc.getDate() + parseInt(vigenciaValor || 0)); break;
                    case "Semana(s)": venc.setDate(venc.getDate() + parseInt(vigenciaValor || 0) * 7); break;
                    case "Mes(es)": venc.setMonth(venc.getMonth() + parseInt(vigenciaValor || 0)); break;
                    case "Año(s)": venc.setFullYear(venc.getFullYear() + parseInt(vigenciaValor || 0)); break;
                }
                spanVencimiento.textContent = venc.toLocaleDateString("es-CO");
            } else {
                spanPreparado.style.display = "none";
                spanVencimiento.style.display = "none";
            }

            let htmlHP = "";
            if (frases_h) frases_h.forEach(f => htmlHP += `<p style="margin: 2px 0;">${f}</p>`);
            if (frases_p) frases_p.forEach(f => htmlHP += `<p style="margin: 2px 0;">${f}</p>`);
            document.getElementById("frasesHP").innerHTML = htmlHP;

            const zonaImg = document.getElementById("zonaPictogramas");
            const qrElemento = document.getElementById('qrCarpetaDrive');

            zonaImg.innerHTML = "";
            qrElemento.src = "";

            setTimeout(() => {
                const picos = pictogramas || [];
                const volNumerico = parseInt(envase);
                const listaFinal = (volNumerico < 100 && picos.length > 0) ? [picos[0]] : picos;

                let htmlPictos = "";
                const count = listaFinal.length;

                if (count === 1) {
                    zonaImg.style.width = "180px";
                    zonaImg.style.height = "180px";
                    htmlPictos = `<img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">`;
                } else if (count === 2) {
                    zonaImg.style.width = "360px";
                    zonaImg.style.height = "180px";
                    htmlPictos = `
            <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">
            <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:0; left:180px;">
          `;
                } else if (count === 3) {
                    zonaImg.style.width = "385px";
                    zonaImg.style.height = "307px";
                    htmlPictos = `
            <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:102.5px;">
            <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:127px; left:0;">
            <img src="/imagenes/${getPictogramName(listaFinal[2])}.png" class="img-pictograma" style="top:127px; left:205px;">
          `;
                } else if (count === 4) {
                    zonaImg.style.width = "360px";
                    zonaImg.style.height = "370px";
                    htmlPictos = `
            <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">
            <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:0; left:180px;">
            <img src="/imagenes/${getPictogramName(listaFinal[2])}.png" class="img-pictograma" style="top:190px; left:0;">
            <img src="/imagenes/${getPictogramName(listaFinal[3])}.png" class="img-pictograma" style="top:190px; left:180px;">
          `;
                } else if (count === 5) {
                    zonaImg.style.width = "540px";
                    zonaImg.style.height = "310px";
                    htmlPictos = `
            <img src="/imagenes/${getPictogramName(listaFinal[0])}.png" class="img-pictograma" style="top:0; left:0;">
            <img src="/imagenes/${getPictogramName(listaFinal[1])}.png" class="img-pictograma" style="top:0; left:180px;">
            <img src="/imagenes/${getPictogramName(listaFinal[2])}.png" class="img-pictograma" style="top:0; left:360px;">
            <img src="/imagenes/${getPictogramName(listaFinal[3])}.png" class="img-pictograma" style="top:127px; left:90px;">
            <img src="/imagenes/${getPictogramName(listaFinal[4])}.png" class="img-pictograma" style="top:127px; left:270px;">
          `;
                }

                zonaImg.innerHTML = htmlPictos;

                if (nombreReactivo && analista) {
                    generarQRdeCarpeta(nombreReactivo, analista);
                }
            }, 50);
        }

        function getPictogramName(ghsCode) {
            const map = {
                "GHS01": "explosivo",
                "GHS02": "inflamable",
                "GHS03": "comburente",
                "GHS04": "gas",
                "GHS05": "corrosivo",
                "GHS06": "toxico",
                "GHS07": "irritacion",
                "GHS08": "salud",
                "GHS09": "medioambiente"
            };
            return map[ghsCode] || "noaplica";
        }

        async function generarQRdeCarpeta(nombre, analista) {
            const url = `${API_URL}/api/procesarCarpetaReactivo`;
            const qrElemento = document.getElementById('qrCarpetaDrive');
            const datos = JSON.parse(sessionStorage.getItem("datosEtiqueta") || "{}");
            const { modoReactivosPuros, fabricante } = datos.usuario || {};

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', "ngrok-skip-browser-warning": "true" },
                    body: JSON.stringify({
                        nombreReactivo: nombre,
                        usuarioAnalista: analista,
                        modoReactivosPuros: modoReactivosPuros,
                        fabricante: fabricante
                    })
                });

                if (!response.ok) {
                    console.error("Error en servidor al generar QR:", response.status);
                    return;
                }

                const data = await response.json();
                if (data.qr) qrElemento.src = data.qr;
            } catch (e) {
                console.error("Fallo la conexión para el QR:", e);
            }
        }

        window.addEventListener("pageshow", (event) => {
            cargarDatos();
        });

        document.getElementById("btnGuardarPrep").addEventListener("click", async () => {
            const nombreReactivo = document.getElementById("nombreReactivo").textContent;
            const nuevaPreparacion = document.getElementById("preparacion").innerText.trim();

            if (!nuevaPreparacion) {
                setStatus("La preparación no puede estar vacía.", true);
                return;
            }

            setStatus("Guardando en la base de datos...");

            try {
                const res = await fetch(`${API_URL}/api/actualizarPreparacion`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "true"
                    },
                    body: JSON.stringify({
                        nombre: nombreReactivo,
                        preparacion: nuevaPreparacion
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    setStatus("Error al guardar: " + (data.error || "Desconocido"), true);
                    return;
                }

                setStatus("Preparación actualizada correctamente en la base de datos.");
            } catch (err) {
                console.error("Error en petición PUT:", err);
                setStatus("Error de red al intentar guardar la preparación.", true);
            }
        });

        btnPreview.addEventListener("click", async () => {
            if (!window.__ultimoArchivoGenerado) {
                setStatus("No hay archivo generado. Genera el documento primero.", true);
                return;
            }

            setStatus("Iniciando descarga DOCX...");
            const archivo = window.__ultimoArchivoGenerado;
            const urlDescarga = `${API_URL}/api/descargar/${archivo}`;

            try {
                const response = await fetch(urlDescarga, {
                    method: 'GET',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });

                if (!response.ok) {
                    setStatus("Error al descargar el archivo. Código: " + response.status, true);
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = archivo;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

                setStatus("Archivo DOCX descargado correctamente.");
            } catch (error) {
                console.error("Error en la descarga:", error);
                setStatus("Fallo la descarga. Revisa la conexión o consola.", true);
            }
        });

        btn.addEventListener("click", async (e) => {
            e.preventDefault();
            console.log("CLICK EN BOTÓN AZUL DETECTADO");
            setStatus("Capturando etiqueta...");

            const cantidad = parseInt(document.getElementById("inputCantidad").value || "0", 10);
            if (!cantidad || cantidad <= 0) {
                setStatus("Cantidad inválida.", true);
                return;
            }

            try {
                const pPrep = document.getElementById("preparacion");
                pPrep.style.background = "transparent";
                pPrep.style.border = "none";
                const canvas = await html2canvas(contenedor, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    logging: false,
                    width: contenedor.offsetWidth,
                    windowWidth: contenedor.offsetWidth
                });

                const dataUrl = canvas.toDataURL("image/png");
                const base64 = dataUrl.replace(/^data:image\/png;base64,/, "");

                setStatus("Enviando imagen al servidor...");

                const res = await fetch(`${API_URL}/api/generarDocumentoEtiquetas`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
                    body: JSON.stringify({
                        base64Imagen: base64,
                        cantidad,
                        envase
                    })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: "Error desconocido" }));
                    setStatus("Error generando documento: " + (err.error || res.statusText), true);
                    return;
                }

                setStatus("Recibiendo documento...");

                const respuesta = await res.json();
                if (!respuesta.ok || !respuesta.archivo) {
                    setStatus("Error: No se recibió nombre del archivo generado.", true);
                    return;
                }

                window.__ultimoArchivoGenerado = respuesta.archivo;
                setStatus("Documento generado correctamente. Ahora puedes descargarlo con el botón gris.");
            } catch (err) {
                console.error(err);
                setStatus("Error generando documento. Revisa la consola.", true);
            }
        });
    </script>

</body>
